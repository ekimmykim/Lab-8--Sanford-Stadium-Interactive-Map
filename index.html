<!DOCTYPE html>
<html>
<head>
    <title> GeoTag Interactive Mapping Exercise</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
        integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
        crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
</head>
<style>

.sidebar {
  position: absolute;
  left: 0px;
  width: 250px;
  top: 0;
  bottom: 0;
  overflow-y: auto;
  height: 100vh;
  padding: 20px;
  font-size: 16px;
  border: solid;
  background-color: #add8e6;
}
.main-heading {
    font-size: 15px;
}
.green-heading {
  color: #3D9970;
  text-align: center;
}

</style>
<body>
  <div class="sidebar">
  <center>
	<h2 class="green-heading">GeoTag Mapping</h2>
  </center>
  <div>

<div class="row">
  <div class="column">
    <center> <img src="images/ugalogo.png" alt="UGA Logo" style="width:60%"> </center>
  </div>
  <font color="MidnightBlue"><center><h3>Welcome to the Heart of the South!</h3></center></font>
  </div>

<h1>UGA Campus Map</h1>
<h2>Athens, Georgia</h2>
<h3>Explore UGA's landmarks including the Sanford Stadium!</h3>
<h3>Go Dawgs! 🐾</h3>

<footer>
       <p> Share this template! <br>https://ekimmykim.github.io/Lab-8--Sanford-Stadium-Interactive-Map/</p>
</footer>

    <div id="map" style=" position: fixed; right: 0; left: 300px; top: 0; bottom: 0 "></div>

    <!-- JS IMPORTS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src= "https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>
    <script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.8.3/underscore-min.js"></script>
    <script src= "js/setup.js"></script>
    <script src= "js/sanford.js"></script>

    <script>

// Create a style variable
    var myStyle = {
    radius: 5,
    fillColor: "#ff7800",
    color: "#000",
    weight: 1,
    opacity: 1,
    fillOpacity: 0.7
};

//Load in geojson
    var sanford = L.geoJSON(sanford, {
          style: myStyle
        }).bindPopup(function (layer) {
       return "" + layer.feature.properties.name
    }).addTo(map).bringToBack();

    // Make a circle
var circle = L.circle([33.9575, -83.3753], {
    color: 'red',
    fillColor: '#f03',
    fillOpacity: 0.5,
    radius: 5
}).addTo(map);

// Add a marker
L.marker([33.9505, -83.3740]).addTo(map).bindPopup("Sanford Stadium - Home of the Georgia Bulldogs! 🐾");


console.log("Map loaded successfully!");
    </script>

</body>
</html>
